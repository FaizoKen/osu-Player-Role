<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>osu! Player Role</title>
<link rel="icon" href="__BASE_URL__/favicon.ico">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; background:#0f1115; color:#e8eaed;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-size:14px; line-height:1.5; padding:24px; }
  h1 { font-size:18px; margin:0 0 4px; }
  .sub { color:#8a93a4; font-size:13px; margin:0 0 22px; }
  .q { font-weight:700; font-size:14px; margin:0 0 9px; }
  /* compact responsive grid of choices */
  .opts { display:grid; grid-template-columns:repeat(auto-fit,minmax(215px,1fr));
    gap:7px; margin-bottom:10px; }
  .opt { display:flex; gap:8px; align-items:flex-start;
    border:1px solid #262b36; border-radius:8px; padding:8px 10px;
    cursor:pointer; background:#14171f; transition:border-color .1s; }
  .opt:hover { border-color:#3a4150; }
  .opt.sel { border-color:#ff66aa; background:#241019; }
  .opt input { margin:1px 0 0; accent-color:#ff66aa; flex:none; }
  .opt .t { font-weight:600; font-size:12.5px; line-height:1.25; }
  .opt .d { color:#8a93a4; font-size:11px; line-height:1.3; margin-top:1px; }
  .extra { margin:0 0 6px; }
  .inline { color:#cfd6e4; font-size:13px; padding:9px 11px;
    border:1px solid #262b36; border-radius:8px; background:#14171f; }
  .inline input { width:90px; background:#0b0d12; color:#e8eaed;
    border:1px solid #2a2f3a; border-radius:6px; padding:5px 7px; font-size:13px; }
  /* mode / blocks */
  .blk { margin:18px 0; }
  .blk label { display:block; font-weight:700; margin:0 0 8px; }
  select, input[type=text], input[type=number] { background:#0b0d12; color:#e8eaed;
    border:1px solid #2a2f3a; border-radius:6px; padding:8px 10px; font-size:13px; }
  select:focus, input:focus { outline:1px solid #ff66aa; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  button { background:#262b36; color:#e8eaed; border:0; border-radius:7px;
    padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer; }
  button:hover { background:#313845; }
  button.primary { background:#ff66aa; color:#1a0a12; padding:11px 22px; font-size:14px; }
  button.primary:hover { background:#ff80bb; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button:disabled:hover { background:#262b36; }
  button.primary:disabled:hover { background:#ff66aa; }
  button.x { background:none; color:#8a93a4; padding:4px 6px; }
  button.x:hover { color:#fca5a5; }
  .live { color:#ff66aa; font-weight:600; }
  /* member link */
  .share { background:#15202b; border:1px solid #1f3346; border-radius:10px;
    padding:13px 15px; margin:22px 0; font-size:13px; color:#a9c3d8; }
  .share b { color:#dbeafe; }
  .share .warn { color:#fbbf24; display:block; margin-top:8px; }
  .copybox { display:flex; gap:8px; margin-top:9px; align-items:stretch; }
  .copybox code { flex:1; min-width:0; background:#0b0d12; border:1px solid #234; border-radius:6px;
    padding:8px 10px; font-size:12px; overflow:auto; white-space:nowrap; }
  .copybox .btn-open { background:#262b36; color:#e8eaed; border:0; border-radius:7px;
    padding:8px 13px; font-size:13px; font-weight:600; cursor:pointer;
    text-decoration:none; display:inline-flex; align-items:center;
    white-space:nowrap; flex:0 0 auto; }
  .copybox .btn-open:hover { background:#313845; }
  /* users-page block — server-wide setting */
  .sup { background:#171b25; border:1px solid #2a2f3a; border-radius:10px;
    padding:13px 15px; margin:14px 0; font-size:13px; color:#cfd6e4; }
  .sup b { color:#e8eaed; }
  .sup .vp { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:7px; margin-top:10px; }
  .sup .vp label { display:flex; gap:8px; align-items:flex-start;
    border:1px solid #262b36; border-radius:8px; padding:8px 10px;
    cursor:pointer; background:#14171f; transition:border-color .1s; }
  .sup .vp label:hover { border-color:#3a4150; }
  .sup .vp label.sel { border-color:#ff66aa; background:#241019; }
  .sup .vp input { margin:1px 0 0; accent-color:#ff66aa; flex:none; }
  .sup .vp .t { font-weight:600; font-size:12.5px; line-height:1.25; }
  .sup .vp .d { color:#8a93a4; font-size:11px; line-height:1.3; margin-top:1px; }
  .sup .saved { color:#ff9ecb; font-size:11.5px; margin-left:8px; opacity:0; transition:opacity .15s; }
  .sup .saved.show { opacity:1; }
  /* advanced */
  .adv { margin:6px 0 0; }
  .grp { border:1px solid #2a2f3a; border-radius:9px; padding:11px;
    margin:8px 0; background:#13161e; }
  .grp-h { display:flex; justify-content:space-between; color:#8a93a4;
    font-size:12px; margin-bottom:6px; }
  .or { text-align:center; color:#ff66aa; font-weight:700; font-size:11px;
    letter-spacing:.08em; margin:4px 0; }
  .cond { display:flex; gap:7px; align-items:center; flex-wrap:wrap;
    padding:6px 0; border-bottom:1px solid #20242e; }
  .cond:last-of-type { border-bottom:0; }
  .hint { color:#7a8497; font-size:11px; flex-basis:100%; margin-left:2px; }
  /* footer */
  .foot { display:flex; justify-content:space-between; align-items:center;
    gap:14px; flex-wrap:wrap; margin-top:26px; padding-top:16px;
    border-top:1px solid #232734; }
  .foot-btns { display:flex; gap:10px; align-items:center; margin-left:auto; }
  .count { color:#8a93a4; font-size:12.5px; }
  .count .ok { color:#58e1a2; font-weight:600; }
  .toast { padding:10px 12px; border-radius:8px; font-size:13px; margin-top:12px; }
  .toast.e { background:#2a1518; border:1px solid #5c2630; color:#f6b8c0; }
  .hidden { display:none !important; }
  /* Mobile / narrow iframe (Discord on a phone embeds this at ~360 px). */
  @media (max-width: 560px) {
    body { padding:16px 14px; font-size:14px; }
    h1 { font-size:17px; }
    .sub { margin-bottom:18px; }
    .opts { grid-template-columns:1fr; gap:6px; }
    .opt { padding:9px 11px; }
    .inline { font-size:13px; padding:9px 11px; }
    .blk { margin:16px 0; }
    select, input[type=text], input[type=number] { font-size:14px; padding:9px 10px; }
    select { max-width:100%; width:100%; }
    .row { gap:8px; }
    .row > select { flex:1 1 100%; min-width:0; }
    .row > button { flex:0 0 auto; }
    .copybox { flex-wrap:wrap; gap:8px; }
    .copybox code { flex:1 1 100%; white-space:normal; word-break:break-all; font-size:12px; }
    .copybox .btn-open, .copybox button { flex:1 1 0; justify-content:center; }
    .share, .sup { padding:12px 13px; }
    .sup .vp { grid-template-columns:1fr; }
    /* Advanced builder: each control gets its own row below ~480 px. */
    .grp { padding:10px; }
    .cond { gap:6px; padding:8px 0; }
    .cond > select, .cond > .vw { flex:1 1 100%; min-width:0; }
    .cond > .vw { display:flex; gap:6px; flex-wrap:wrap; }
    .cond > .vw > input { flex:1 1 0; min-width:0; }
    .cond .hint { font-size:11px; margin-left:0; }
    .cond [data-del] { margin-left:auto; }
    .foot { gap:10px; }
    .count { flex:1 1 100%; order:1; }
    .foot-btns { order:2; width:100%; margin-left:0; }
    .foot-btns > button { flex:1 1 0; }
    button.primary { padding:11px 16px; }
  }
</style>
</head>
<body>
<div id="app"><p class="sub">Loading…</p></div>

<script>
// ===========================================================================
//  osu! Player Role — rule builder
//  Same beginner-first shape as the Kick-Channel-Role reference: one
//  "Who should get this role?" question with plain-language options; the
//  full condition builder lives behind the "Advanced rule" option. Dual-mode
//  page (works embedded in the RoleLogic iframe and on direct nav).
// ===========================================================================
const BASE_URL="__BASE_URL__", GUILD_ID="__GUILD_ID__", ROLE_ID="__ROLE_ID__";
const IFRAME_TOKEN="__IFRAME_TOKEN__", IS_EMBEDDED=!!IFRAME_TOKEN;
const TEAM_GROUPS = ["BN","GMT","NAT","DEV","ALM","BSC"];

function postToHost(m){ if(!IS_EMBEDDED) return; try{ parent.postMessage(m,'*'); }catch(_){} }
function postHeight(){ postToHost({type:'rl:resize',height:Math.max(
  document.documentElement.scrollHeight,document.body.scrollHeight)}); }
const postDirty=d=>postToHost({type:'rl:dirty',dirty:!!d});
const postSaved=()=>postToHost({type:'rl:saved'});
const postToast=(m,k)=>postToHost({type:'rl:toast',message:String(m||''),kind:k||'error'});
if(IS_EMBEDDED&&'ResizeObserver'in window) new ResizeObserver(postHeight).observe(document.body);
window.addEventListener('load',postHeight);

function apiHeaders(x){ const h=Object.assign({'Content-Type':'application/json'},x||{});
  if(IFRAME_TOKEN) h['Authorization']='Bearer '+IFRAME_TOKEN; return h; }
// Read-only mode: a RoleLogic developer viewing this config while
// impersonating the user. The server (admin.rs) rejects writes; we also
// lock the UI. Self-contained IIFE with generic selectors so it works
// regardless of this template's layout.
(function(){
  var READ_ONLY = '__READ_ONLY__' === '1';
  if (!READ_ONLY) return;
  document.documentElement.classList.add('rl-read-only');
  var st = document.createElement('style');
  st.textContent =
    '.rl-read-only input,.rl-read-only select,.rl-read-only textarea,' +
    '.rl-read-only button:not(.rl-ro-allow),.rl-read-only [contenteditable]' +
    '{pointer-events:none !important;opacity:.6 !important}' +
    '.rl-ro-banner{position:sticky;top:0;z-index:9999;background:#3a2d05;' +
    'color:#fbbf24;border-bottom:1px solid #6b5409;padding:8px 16px;' +
    'font:600 13px system-ui,sans-serif}';
  document.head.appendChild(st);
  function addBanner(){
    var bn = document.createElement('div');
    bn.className = 'rl-ro-banner rl-ro-allow';
    bn.textContent = 'Read-only \u2014 impersonating a user. Changes are disabled.';
    document.body.prepend(bn);
  }
  if (document.body) addBanner();
  else addEventListener('DOMContentLoaded', addBanner);
})();
function apiCreds(){ return IS_EMBEDDED?'omit':'include'; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Clipboard write that works in iframes without `allow="clipboard-write"`.
function copyText(text){
  const fallback=()=>{ try{
    const ta=document.createElement('textarea'); ta.value=text;
    ta.setAttribute('readonly',''); ta.style.position='fixed';
    ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,text.length);
    const ok=document.execCommand('copy'); document.body.removeChild(ta); return ok;
  }catch(_){ return false; } };
  if(navigator.clipboard&&navigator.clipboard.writeText){
    return navigator.clipboard.writeText(text).then(()=>true,()=>fallback());
  }
  return Promise.resolve(fallback());
}
function wireCopy(btnId,text){ const b=document.getElementById(btnId); if(!b) return;
  b.addEventListener('click',()=>{ copyText(text).then(ok=>{
    b.textContent=ok?'Copied ✓':'Press Ctrl+C';
    setTimeout(()=>b.textContent='Copy link',1500); }); }); }

let state=null, dirty=false, refreshInFlight=false, supPending=false;
let HELP={};
function setDirty(d){ dirty=d; postDirty(d);
  const s=document.getElementById('save'); if(s) s.disabled=!d; }

// Per-mode targets (rank, pp, play count, …) depend on the chosen game mode;
// profile targets (supporter, country, badges, …) don't.
function isPerModeKey(k){ const t=(state.targets||[]).find(x=>x.key===k); return !!(t&&t.is_per_mode); }
function ruleUsesMode(c){
  if(c.grant_on_any_player) return false;
  return (c.groups||[]).some(g=>(g.conditions||[]).some(cc=>isPerModeKey(cc.target)));
}
// Compare the in-progress edit against the saved baseline; only mark dirty
// when they actually differ. Mode only counts when a per-mode target is in
// play, so flipping mode on a profile-only rule doesn't show a false "unsaved".
function ruleKey(c){ return JSON.stringify({
  g:!!c.grant_on_any_player,
  m: ruleUsesMode(c) ? (c.default_mode||'osu') : null,
  r: c.grant_on_any_player ? [] : (c.groups||[]),
}); }
function recomputeDirty(){
  if(!state||!state._edit||!state.config) return;
  setDirty(ruleKey(state._edit)!==ruleKey(state.config));
}

/* preset id -> friendly copy + rule shape. Tunable presets read state._n
   (a number) or state._cc (a country code) so the extra input below the
   grid stays live. `make:null` => the Advanced builder. */
function presets(){ return [
 {id:"anyone", t:"Anyone who linked their osu!", d:"Simplest option. No stats needed.",
  make:()=>({grant:true,groups:[]})},
 {id:"top_global", t:"Top players worldwide", d:"Global rank at or above a cutoff.", n:1000,
  make:n=>({grant:false,groups:[[c('global_rank','lte',n||1000)]]})},
 {id:"top_country", t:"Top players in their country", d:"Country rank at or above a cutoff.", n:100,
  make:n=>({grant:false,groups:[[c('country_rank','lte',n||100)]]})},
 {id:"skilled_pp", t:"Skilled players (by pp)", d:"At least N performance points.", n:5000,
  make:n=>({grant:false,groups:[[c('performance_points','gte',n||5000)]]})},
 {id:"supporters", t:"osu!supporters", d:"Anyone with an active supporter tag.",
  make:()=>({grant:false,groups:[[c('is_supporter','eq',true)]]})},
 {id:"mappers", t:"Beatmap creators", d:"Has at least one ranked beatmap.",
  make:()=>({grant:false,groups:[[c('ranked_beatmaps','gte',1)]]})},
 {id:"team", t:"osu! team members", d:"BN, GMT, NAT, DEV, ALM or BSC.",
  make:()=>({grant:false,groups:[[c('group_name','in',TEAM_GROUPS.slice())]]})},
 {id:"country", t:"From a specific country", d:"Players from one country code.", cc:"JP",
  make:cc=>({grant:false,groups:[[c('country_code','eq',String(cc||'JP').toUpperCase())]]})},
 {id:"custom", t:"Advanced rule", d:"Combine several conditions with AND / OR.", make:null},
];}
function c(t,o,v){ return {target:t,operator:o,value:v,value_end:null}; }
// Game mode only matters for the per-mode presets and the advanced builder.
function needsMode(id){ return id==='top_global'||id==='top_country'||id==='skilled_pp'||id==='custom'; }

async function load(){
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/data`,
      {headers:apiHeaders(),credentials:apiCreds(),cache:'no-store'});
    if(!r.ok){ const e=await r.json().catch(()=>({error:r.status}));
      document.getElementById('app').innerHTML=`<div class="toast e">${esc(e.error||('HTTP '+r.status))}</div>`;
      postHeight(); return; }
    state=await r.json();
    HELP={}; (state.targets||[]).forEach(t=>{ HELP[t.key]=t.help||''; });
    state._edit=JSON.parse(JSON.stringify(state.config));
    if(!state._edit.default_mode) state._edit.default_mode='osu';
    state._preset=detectPreset(state._edit);
    state._n=guessN(state._edit);
    state._cc=guessCode(state._edit);
    // Freshly-registered role: groups [] + grant false is the "unconfigured →
    // grants to nobody" sentinel. Show "Anyone who linked their osu!"
    // pre-selected and align the edit buffer so a single Save applies that
    // sensible default instead of re-persisting the grant-to-nobody sentinel.
    if(state._preset==='anyone_unset'){
      state._edit.grant_on_any_player=true;
      state._edit.groups=[];
      state._preset='anyone';
      recomputeDirty();
    }
    render(); autoPreview();
  }catch(e){ document.getElementById('app').innerHTML=
    `<div class="toast e">Network error: ${esc(String(e))}</div>`; }
}
function detectPreset(cfg){
  if(cfg.grant_on_any_player) return 'anyone';
  const g=cfg.groups||[];
  if(g.length===0) return 'anyone_unset';
  if(g.length===1){
    const cs=g[0].conditions||[];
    if(cs.length===1){
      const x=cs[0];
      if(x.target==='global_rank'&&x.operator==='lte') return 'top_global';
      if(x.target==='country_rank'&&x.operator==='lte') return 'top_country';
      if(x.target==='performance_points'&&x.operator==='gte') return 'skilled_pp';
      if(x.target==='is_supporter'&&x.operator==='eq'&&(x.value===true||x.value==='true')) return 'supporters';
      if(x.target==='ranked_beatmaps'&&x.operator==='gte'&&Number(x.value)===1) return 'mappers';
      if(x.target==='country_code'&&x.operator==='eq') return 'country';
      if(x.target==='group_name'&&x.operator==='in'){
        const v=Array.isArray(x.value)?x.value:[];
        if(v.length===TEAM_GROUPS.length&&TEAM_GROUPS.every(k=>v.includes(k))) return 'team';
      }
    }
  }
  return 'custom';
}
function guessN(cfg){ try{
  const x=cfg.groups[0].conditions[0];
  if(['global_rank','country_rank','performance_points'].includes(x.target)) return Number(x.value)||null;
}catch(_){} return null; }
function guessCode(cfg){ try{
  const x=cfg.groups[0].conditions[0];
  if(x.target==='country_code'&&x.operator==='eq') return String(x.value||'JP').toUpperCase();
}catch(_){} return 'JP'; }
function defaultN(id){ const p=presets().find(x=>x.id===id); return p?p.n:null; }
function targetByKey(k){ return state.targets.find(t=>t.key===k); }
function opByKey(k){ return state.operators.find(o=>o.key===k); }
function opsForKind(k){ return state.operators.filter(o=>o.valid_for[k]); }
function modeLabel(k){ const m=(state.modes||[]).find(x=>x.key===k); return m?m.label:k; }

function render(){
  const cfg=state._edit, app=document.getElementById('app');
  const cur=state._preset;
  // Per-guild verify URL from the data endpoint (carries `?guild=<id>` so
  // that members opening it auto-clear any prior opt-out for this server).
  // Fall back to the bare /verify path so older data responses keep working.
  const verifyUrl=state.verify_url||(BASE_URL+"/verify");

  const opts=presets().map(p=>{
    const on=(cur===p.id);
    return `<label class="opt ${on?'sel':''}">
      <input type="radio" name="who" value="${p.id}" ${on?'checked':''}>
      <div><div class="t">${esc(p.t)}</div><div class="d">${esc(p.d)}</div></div></label>`;
  }).join('');

  // Conditional extra (tunable number / country code / advanced builder)
  // lives BELOW the grid so every option row stays one compact line.
  let extra='';
  if(cur==='top_global') extra=`<div class="extra"><div class="inline">Global rank at most
    <input type="number" id="tn" min="1" value="${state._n||1000}"> (smaller = better; top 1,000 is elite)</div></div>`;
  else if(cur==='top_country') extra=`<div class="extra"><div class="inline">Country rank at most
    <input type="number" id="tn" min="1" value="${state._n||100}"></div></div>`;
  else if(cur==='skilled_pp') extra=`<div class="extra"><div class="inline">At least
    <input type="number" id="tn" min="0" value="${state._n||5000}"> performance points (pp)</div></div>`;
  else if(cur==='country') extra=`<div class="extra"><div class="inline">Country code
    <input type="text" id="tc" maxlength="2" style="width:64px;text-transform:uppercase"
      value="${esc(state._cc||'JP')}"> (2 letters: US, KR, BR, GB, …)</div></div>`;
  else if(cur==='custom') extra=`<div class="extra"><div class="adv" id="rule"></div></div>`;

  // Game mode picker — shown only when the choice actually reads per-mode
  // stats (mirrors how the Kick reference reveals its channel block only
  // when the chosen option needs it).
  let modeBlk='';
  if(needsMode(cur)){
    const modes=state.modes||[];
    const cell=modes.map(m=>{ const on=(cfg.default_mode||'osu')===m.key;
      return `<label class="opt ${on?'sel':''}" style="min-width:0">
        <input type="radio" name="mode" value="${esc(m.key)}" ${on?'checked':''}>
        <div><div class="t">${esc(m.label)}</div></div></label>`; }).join('');
    modeBlk=`<div class="blk"><label>Game mode</label>
      <div class="opts">${cell}</div>
      <div class="hint" style="margin-left:2px">Rank, pp, play count, accuracy, etc.
        are read for this mode. Profile facts (supporter, country, badges) ignore it.</div></div>`;
  }

  // Public users-page server-wide setting.
  const sup = state.users || {url:'', view_permission:'managers'};
  const vp = sup.view_permission || 'managers';
  const vpOpts = [
    {id:'disabled', t:'Disabled',          d:'No one can view the players page.'},
    {id:'managers', t:'Server managers',   d:'Only members with Manage Server.'},
    {id:'members',  t:'All server members',d:'Anyone in this server can view.'},
  ];
  const usersBlk = `
    <div class="sup">
      <b>Public players page</b><span id="vp-saved" class="saved">Saved ✓</span>
      <div style="margin-top:4px; color:#8a93a4; font-size:12.5px">
        A read-only list of every linked osu! account in this server, with
        their stats. Searchable and filterable.
      </div>
      ${vp!=='disabled' ? `<div class="copybox" style="margin-top:9px">
        <code id="surl">${esc(sup.url)}</code>
        <a class="btn-open" href="${esc(sup.url)}" target="_blank" rel="noopener noreferrer">Open</a>
        <button id="copysup">Copy link</button></div>` : ''}
      <div class="vp">
        ${vpOpts.map(o=>`<label class="${o.id===vp?'sel':''}">
          <input type="radio" name="vp" value="${o.id}" ${o.id===vp?'checked':''}>
          <div><div class="t">${esc(o.t)}</div><div class="d">${esc(o.d)}</div></div>
        </label>`).join('')}
      </div>
    </div>`;

  const oauthWarn = state.osu_oauth_configured===false
    ? `<span class="warn">⚠ osu! sign-in isn't set up on this server yet — members
       can't link until the operator configures it.</span>` : '';

  app.innerHTML=`
    <h1>osu! Player Role</h1>
    <p class="sub">Give this Discord role to people automatically, based on their osu! account.</p>
    <div class="q">Who should get this role?</div>
    <div class="opts">${opts}</div>
    ${extra}
    ${modeBlk}
    <div class="share"><b>One thing your members must do:</b> they have to link their
      osu! account once, here — until they do, they won't get the role even if they qualify.
      <div class="copybox"><code id="vurl">${esc(verifyUrl)}</code>
        <a class="btn-open" href="${esc(verifyUrl)}" target="_blank" rel="noopener noreferrer">Open</a>
        <button id="copy">Copy link</button></div>
      ${oauthWarn}
    </div>
    ${usersBlk}
    <div class="foot">
      <span class="count" id="count"></span>
      <div class="foot-btns">
        <button id="preview">Preview</button>
        <button id="save" class="primary" ${dirty?'':'disabled'}>Save</button>
      </div>
    </div>`;

  app.querySelectorAll('input[name=who]').forEach(r=>r.addEventListener('change',()=>choose(r.value)));
  app.querySelectorAll('input[name=mode]').forEach(r=>r.addEventListener('change',()=>{
    cfg.default_mode=r.value; recomputeDirty(); render(); autoPreview(); }));
  wireCopy('copy', verifyUrl);
  wireCopy('copysup', sup.url);
  app.querySelectorAll('input[name=vp]').forEach(r=>r.addEventListener('change',()=>setViewPerm(r.value)));
  const tn=document.getElementById('tn'); if(tn) tn.addEventListener('input',e=>{
    state._n=Math.max(0,Number(e.target.value)||0); applyPreset(cur,true); });
  const tc=document.getElementById('tc'); if(tc) tc.addEventListener('input',e=>{
    state._cc=String(e.target.value||'').toUpperCase(); applyPreset('country',true); });
  document.getElementById('save').addEventListener('click',doSave);
  document.getElementById('preview').addEventListener('click',doPreviewEdit);
  if(cur==='custom') renderRule();
  postHeight();
}

function choose(id){ state._preset=id; applyPreset(id); render(); autoPreview(); }
function applyPreset(id,keepRender){
  const p=presets().find(x=>x.id===id);
  if(id==='custom'){
    state._edit.grant_on_any_player=false;
    if(!state._edit.groups||state._edit.groups.length===0)
      state._edit.groups=[{conditions:[c(firstTargetKey(),'eq',true)]}];
  } else if(p&&p.make){
    const arg = id==='country' ? (state._cc||'JP') : (state._n||defaultN(id));
    const r=p.make(arg);
    state._edit.grant_on_any_player=r.grant;
    state._edit.groups=r.groups.map(cs=>({conditions:cs}));
  }
  recomputeDirty();
  if(!keepRender) {} // render() called by caller
}
// Seed new advanced conditions with the first boolean target so the default
// ("<target> must be true") is valid and saveable as-is — osu's first
// catalog target is an integer (global_rank), where `eq true` would fail
// validation on an untouched save.
function firstTargetKey(){
  const ts=state.targets||[];
  const b=ts.find(t=>t.kind==='bool');
  return (b||ts[0]||{key:'is_supporter'}).key;
}

/* ---- advanced builder (only under the "Advanced rule" option) ---- */
function renderRule(){
  const box=document.getElementById('rule'); if(!box) return;
  const cfg=state._edit;
  if(!cfg.groups||cfg.groups.length===0) cfg.groups=[{conditions:[c(firstTargetKey(),'eq',true)]}];
  box.innerHTML=`<p class="d" style="margin:8px 0; color:#8a93a4; font-size:12.5px">A member
    gets the role if they match <b>any</b> group. Within a group, <b>all</b> conditions
    must be true.</p>`+
    cfg.groups.map((g,gi)=>`
    ${gi>0?'<div class="or">— OR —</div>':''}
    <div class="grp" data-g="${gi}">
      <div class="grp-h"><span>Group ${gi+1} — all true</span>
        <button class="x" data-dg="${gi}">remove</button></div>
      ${g.conditions.map((cc,ci)=>condRow(cc,gi,ci)).join('')}
      <button data-ac="${gi}" style="margin-top:6px">+ condition</button>
    </div>`).join('')+`<button id="ag" style="margin-top:8px">+ OR group</button>`;
  box.querySelectorAll('[data-dg]').forEach(b=>b.onclick=()=>{ cfg.groups.splice(+b.dataset.dg,1);
    if(cfg.groups.length===0) cfg.groups=[{conditions:[c(firstTargetKey(),'eq',true)]}];
    recomputeDirty(); renderRule(); postHeight(); });
  box.querySelectorAll('[data-ac]').forEach(b=>b.onclick=()=>{
    const grp=cfg.groups[+b.dataset.ac];
    if(grp.conditions.length>=state.limits.max_conditions_per_group){
      postToast(`Max ${state.limits.max_conditions_per_group} conditions per group.`); return; }
    grp.conditions.push(c(firstTargetKey(),'eq',true)); recomputeDirty(); renderRule(); postHeight(); });
  const ag=document.getElementById('ag'); if(ag) ag.onclick=()=>{
    if(cfg.groups.length>=state.limits.max_groups){ postToast(`Max ${state.limits.max_groups} groups.`); return; }
    cfg.groups.push({conditions:[c(firstTargetKey(),'eq',true)]}); recomputeDirty(); renderRule(); postHeight(); };
  box.querySelectorAll('[data-cond]').forEach(wireCond);
}
function condRow(cc,gi,ci){
  const tgt=targetByKey(cc.target)||state.targets[0];
  const perMode=state.targets.filter(t=>t.is_per_mode);
  const profile=state.targets.filter(t=>!t.is_per_mode);
  const optsFor=list=>list.map(t=>`<option value="${t.key}" ${t.key===cc.target?'selected':''}>${esc(t.label)}</option>`).join('');
  const tsel=`<optgroup label="Per-mode (uses the game mode above)">${optsFor(perMode)}</optgroup>`+
             `<optgroup label="Profile (mode-independent)">${optsFor(profile)}</optgroup>`;
  let mid;
  if(tgt.kind==='bool'){ const m=cc.value===true||cc.value==='true';
    mid=`<select class="bv"><option value="1" ${m?'selected':''}>must be true</option><option value="0" ${!m?'selected':''}>must be false</option></select>`;
  } else { const ops=opsForKind(tgt.kind);
    mid=`<select class="o">${ops.map(o=>`<option value="${o.key}" ${o.key===cc.operator?'selected':''}>${esc(o.label)}</option>`).join('')}</select><span class="vw">${valWidget(tgt,cc)}</span>`; }
  return `<div class="cond" data-cond data-g="${gi}" data-c="${ci}"><select class="t">${tsel}</select>${mid}
    <button class="x" data-del>×</button><div class="hint">${esc(HELP[cc.target]||'')}</div></div>`;
}
function valWidget(tgt,cc){ const op=opByKey(cc.operator)||{};
  if(op.value_is_list) return `<input type="text" class="v" placeholder="BN, GMT, NAT" value="${esc(Array.isArray(cc.value)?cc.value.join(', '):'')}">`;
  if(op.needs_value_end) return `<input type="number" class="v" placeholder="min" value="${cc.value??''}"> and <input type="number" class="ve" placeholder="max" value="${cc.value_end??''}">`;
  if(tgt.kind==='int') return `<input type="number" class="v" value="${cc.value??''}">`;
  return `<input type="text" class="v" value="${esc(cc.value==null?'':cc.value)}">`; }
function wireCond(row){
  const gi=+row.dataset.g, ci=+row.dataset.c, cfg=state._edit, cc=cfg.groups[gi].conditions[ci];
  row.querySelector('.t').onchange=e=>{ cc.target=e.target.value; const t=targetByKey(cc.target);
    if(t.kind==='bool'){ cc.operator='eq'; cc.value=true; } else { const v=opsForKind(t.kind);
      if(!v.find(x=>x.key===cc.operator)) cc.operator=v[0].key; cc.value=t.kind==='int'?0:''; }
    cc.value_end=null; recomputeDirty(); renderRule(); postHeight(); };
  const bv=row.querySelector('.bv'); if(bv) bv.onchange=e=>{ cc.operator='eq'; cc.value=e.target.value==='1'; recomputeDirty(); };
  const o=row.querySelector('.o'); if(o) o.onchange=e=>{ cc.operator=e.target.value; cc.value_end=null; recomputeDirty(); renderRule(); postHeight(); };
  row.querySelectorAll('.v,.ve').forEach(inp=>inp.oninput=()=>{ const t=targetByKey(cc.target),op=opByKey(cc.operator)||{};
    if(inp.classList.contains('ve')) cc.value_end=inp.value===''?null:Number(inp.value);
    else if(op.value_is_list) cc.value=inp.value.split(',').map(s=>s.trim()).filter(Boolean);
    else if(t.kind==='int') cc.value=inp.value===''?'':Number(inp.value);
    else cc.value=inp.value; recomputeDirty(); });
  row.querySelector('[data-del]').onclick=()=>{ cfg.groups[gi].conditions.splice(ci,1);
    if(cfg.groups[gi].conditions.length===0) cfg.groups.splice(gi,1);
    if(cfg.groups.length===0) cfg.groups=[{conditions:[c(firstTargetKey(),'eq',true)]}];
    recomputeDirty(); renderRule(); postHeight(); };
}

async function setViewPerm(next){
  const prev=(state.users&&state.users.view_permission)||'managers';
  if(next===prev) return;
  if(!state.users) state.users={url:'',view_permission:prev};
  state.users.view_permission=next;
  supPending=true; render(); // optimistic
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/view-permission`,
      {method:'POST',headers:apiHeaders(),credentials:apiCreds(),
       body:JSON.stringify({view_permission:next})});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ state.users.view_permission=prev; render();
      postToast(d.error||'Could not update players-page access.'); return; }
    render();
    const pill=document.getElementById('vp-saved');
    if(pill){ pill.classList.add('show');
      clearTimeout(setViewPerm._t);
      setViewPerm._t=setTimeout(()=>pill.classList.remove('show'),1800); }
  }catch(e){ state.users.view_permission=prev; render();
    postToast('Network error: '+e); }
  finally{ supPending=false; }
}
async function doPreview(){
  const el=document.getElementById('count'); if(!el) return;
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/preview`,
      {headers:apiHeaders(),credentials:apiCreds(),cache:'no-store'});
    const d=await r.json();
    if(!r.ok||d.available===false){ el.textContent=''; return; }
    el.innerHTML=`<span class="ok">${d.matching}</span> of ${d.linked} linked member(s) match`
      +(dirty?` · <span style="color:#fbbf24">Save to apply</span>`:``);
  }catch(_){ el.textContent=''; }
  postHeight();
}
function autoPreview(){ doPreview(); }
// Previews the *current* (possibly unsaved) edit.
async function doPreviewEdit(){
  const el=document.getElementById('count'); const btn=document.getElementById('preview');
  if(!btn) return;
  const cfg=state._edit;
  const payload={ grant_on_any_player:cfg.grant_on_any_player,
    default_mode:cfg.default_mode||'osu',
    groups: cfg.grant_on_any_player?[]:(cfg.groups||[]) };
  btn.disabled=true; const orig=btn.textContent; btn.textContent='Previewing…';
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/preview`,
      {method:'POST',headers:apiHeaders(),credentials:apiCreds(),body:JSON.stringify(payload)});
    const d=await r.json().catch(()=>({}));
    if(!r.ok){ postToast(d.error||('Preview failed (HTTP '+r.status+')')); return; }
    if(d.available===false){ el.textContent=d.reason||'Preview unavailable.'; postHeight(); return; }
    el.innerHTML=`<span class="ok">${d.matching}</span> of ${d.linked} linked member(s) match`
      +(dirty?` · <span style="color:#fbbf24">Preview of unsaved rule</span>`:``);
  }catch(e){ postToast('Network error: '+e); }
  finally{ btn.disabled=false; btn.textContent=orig; postHeight(); }
}
async function doSave(){
  const cfg=state._edit;
  const payload={ rule_tree_version:state.rule_tree_version,
    grant_on_any_player:cfg.grant_on_any_player,
    default_mode:cfg.default_mode||'osu',
    groups: cfg.grant_on_any_player?[]:(cfg.groups||[]) };
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/save`,
      {method:'POST',headers:apiHeaders(),credentials:apiCreds(),body:JSON.stringify(payload)});
    const d=await r.json().catch(()=>({}));
    if(r.status===409){ postToast('Changed in another tab. Reload to get the latest, then re-apply.'); return; }
    if(!r.ok){ postToast(d.error||('Save failed (HTTP '+r.status+')')); return; }
    state.rule_tree_version=d.rule_tree_version; state.config=JSON.parse(JSON.stringify(cfg));
    setDirty(false); postSaved();
    postToast('Saved ✓  Roles update within a minute. Make sure members link osu! using the link above.','success');
    autoPreview();
  }catch(e){ postToast('Network error: '+e); }
}

async function refreshFromServer(){
  if(!state||refreshInFlight) return; refreshInFlight=true;
  try{
    const r=await fetch(`${BASE_URL}/admin/${GUILD_ID}/role/${ROLE_ID}/data`,
      {headers:apiHeaders(),credentials:apiCreds(),cache:'no-store'});
    if(r.ok){ const d=await r.json();
      const cfgCh=JSON.stringify(d.config)!==JSON.stringify(state.config);
      const supCh=JSON.stringify(d.users)!==JSON.stringify(state.users);
      const applySup = supCh && !supPending;
      if(applySup) state.users=d.users;
      if(cfgCh&&!dirty){ state.config=d.config; state._edit=JSON.parse(JSON.stringify(d.config));
        if(!state._edit.default_mode) state._edit.default_mode='osu';
        state.rule_tree_version=d.rule_tree_version;
        state._preset=detectPreset(state._edit); state._n=guessN(state._edit); state._cc=guessCode(state._edit); }
      if(applySup||(cfgCh&&!dirty)){ render(); autoPreview(); } }
  }catch(_){}
  finally{ refreshInFlight=false; }
}
window.addEventListener('message',e=>{ if(e.data&&e.data.type==='rl:visible') refreshFromServer(); });
window.addEventListener('focus',refreshFromServer);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) refreshFromServer(); });
if(!IS_EMBEDDED) window.addEventListener('beforeunload',e=>{ if(dirty){ e.preventDefault(); e.returnValue=''; } });

load();
</script>
</body>
</html>
